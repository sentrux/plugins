[plugin]
name = "typescript"
display_name = "TypeScript"
version = "0.1.0"
extensions = ["ts", "mts", "cts", "tsx"]
min_sentrux_version = "0.3.0"

[plugin.metadata]
author = "sentrux"
license = "MIT"

[grammar]
source = "https://github.com/tree-sitter/tree-sitter-typescript"
ref = "master"
abi_version = 14

[queries]
capabilities = ["functions", "classes", "imports"]

[checksums]
