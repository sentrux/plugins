[plugin]
name = "javascript"
display_name = "JavaScript"
version = "0.1.0"
extensions = ["js", "mjs", "cjs", "jsx"]
min_sentrux_version = "0.3.0"

[plugin.metadata]
author = "sentrux"
license = "MIT"

[grammar]
source = "https://github.com/tree-sitter/tree-sitter-javascript"
