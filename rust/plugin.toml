[plugin]
name = "rust"
display_name = "Rust"
version = "0.1.0"
extensions = ["rs"]
min_sentrux_version = "0.3.0"

[plugin.metadata]
author = "sentrux"
license = "MIT"

[grammar]
source = "https://github.com/tree-sitter/tree-sitter-rust"
ref = "master"
abi_version = 14

[queries]
capabilities = ["functions", "classes", "imports"]

[checksums]
