[plugin]
name = "scala"
display_name = "Scala"
version = "0.1.0"
extensions = ["scala", "sc"]
min_sentrux_version = "0.3.0"

[plugin.metadata]
author = "sentrux"
license = "MIT"

[grammar]
source = "https://github.com/tree-sitter/tree-sitter-scala"
ref = "master"
abi_version = 14

[queries]
capabilities = ["functions", "classes", "imports"]

[checksums]
