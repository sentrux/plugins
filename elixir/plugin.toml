[plugin]
name = "elixir"
display_name = "Elixir"
version = "0.1.0"
extensions = ["ex", "exs"]
min_sentrux_version = "0.3.0"

[plugin.metadata]
author = "sentrux"
license = "MIT"

[grammar]
source = "https://github.com/elixir-lang/tree-sitter-elixir"
ref = "main"
abi_version = 14

[queries]
capabilities = ["functions", "imports"]

[checksums]
