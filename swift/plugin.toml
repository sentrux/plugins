[plugin]
name = "swift"
display_name = "Swift"
version = "0.1.0"
extensions = ["swift"]
min_sentrux_version = "0.3.0"

[plugin.metadata]
author = "sentrux"
license = "MIT"

[grammar]
source = "https://github.com/alex-pinkus/tree-sitter-swift"
ref = "main"
abi_version = 14

[queries]
capabilities = ["functions", "classes", "imports"]

[checksums]
